function adjLblZoom(delta) {
  _saveLblChecks();
  if (delta === 0) {
    S.labelZoom = 0.5; // reset
  } else {
    const cur = S.labelZoom || 0.5;
    S.labelZoom = Math.min(2.0, Math.max(0.2, Math.round((cur + delta) * 10) / 10));
  }
  render();
}

function _saveLblChecks() {
  // persist checkbox state into S before re-render
  document.querySelectorAll('.lbl-chk-snake').forEach(el => {
    if (!S.lblSelSnakes) S.lblSelSnakes = {};
    S.lblSelSnakes[el.dataset.id] = el.checked;
  });
  document.querySelectorAll('.lbl-chk-rack').forEach(el => {
    if (!S.lblSelRacks) S.lblSelRacks = {};
    S.lblSelRacks[el.dataset.id] = el.checked;
  });
}

function setAllLblChecks(type, val) {
  const cls = type === 'snake' ? '.lbl-chk-snake' : '.lbl-chk-rack';
  document.querySelectorAll(cls).forEach(el => { el.checked = val; });
}

function _getSelSnakes() {
  _saveLblChecks();
  // #ff0099 = Rack Builder pink, #ec4899 = Loom Builder pink (synced snakes use LB palette)
  const isSpare = sn => sn.color === '#ff0099' || sn.color === '#ec4899' || / SP$/i.test((sn.name||'').trim());
  return (S.project.snakes||[]).filter(s =>
    !isSpare(s) && (s.type==='cpc4'||s.type==='cpc8') && (S.lblSelSnakes||{})[s.id] !== false
  );
}

function _getSelRacks() {
  _saveLblChecks();
  return (S.project.racks||[]).filter(r => (S.lblSelRacks||{})[r.id] !== false);
}

// ── CPC Label Helpers ─────────────────────────────────────

// Build one column (12 cells) per snake — first cell is a header, rest are lines
function _buildCpcColumns(snakes) {
  const ROWS = 12;
  const EMPTY = { type:'empty-slot', univ:'', loc:'', lineNum:0, snakeName:'' };
  return snakes.map(snake => {
    const maxLines = snake.type === 'cpc8' ? 8 : 4;
    const typeLabel = snake.type === 'cpc8' ? 'CPC8' : 'CPC4';
    const lines    = snake.lines || [];

    // Header cell — uses the snake's own color as background
    const col = [{
      type: 'header',
      univ: snake.name,
      loc:  typeLabel,
      lineNum: 0,
      snakeName: snake.name,
      color: snake.color || '#222222'
    }];

    for (let i = 0; i < maxLines; i++) {
      const line = lines[i];
      if (!line) {
        col.push({ type:'unused', univ:`LINE ${i+1}`, loc:snake.location||snake.name, lineNum:i+1, snakeName:snake.name });
        continue;
      }
      const univ    = (line.universe||'').trim();
      const loc     = (line.position||snake.location||snake.name||'').trim();
      const isEmpty = !univ;
      const isSpLn  = !isEmpty && univ.toUpperCase().includes('SP');
      col.push({
        type: isEmpty ? 'unused' : isSpLn ? 'spare' : 'normal',
        univ: isEmpty ? `LINE ${i+1}` : univ,
        loc,
        lineNum: i+1,
        snakeName: snake.name
      });
    }
    // pad column to ROWS with empty slots (header + maxLines + padding = 12)
    while (col.length < ROWS) col.push(EMPTY);
    return col;
  });
}

// Interleave columns row-by-row (for CSS grid row-major fill)
function _interleaveCols(sheetCols, COLS, ROWS) {
  const EMPTY = { type:'empty-slot', univ:'', loc:'', lineNum:0, snakeName:'' };
  const padded = [...sheetCols];
  while (padded.length < COLS) padded.push(Array(ROWS).fill(EMPTY));
  const cells = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      cells.push(padded[c][r] || EMPTY);
  return cells;
}

function _cpcLabelPreview(allSnakes) {
  const selSnakes = allSnakes.filter(s => (S.lblSelSnakes||{})[s.id] !== false);
  if (!selSnakes.length) return `<div style="color:var(--text-muted);padding:40px;text-align:center">Select snakes from the sidebar to preview labels.</div>`;

  const COLS = 6, ROWS = 12;
  const SC   = S.labelZoom || 0.5;  // preview scale
  const ML   = 0.5, MT = 1.0;  // OL285 margins in inches

  const columns     = _buildCpcColumns(selSnakes);
  const totalSheets = Math.ceil(columns.length / COLS);
  const totalLabels = selSnakes.reduce((n, s) => n + (s.type==='cpc8' ? 8 : 4), 0);

  let html = `<div class="lbl-preview-header">
    <h3>CPC Breakout Labels</h3>
    <span class="lbl-info">${selSnakes.length} snakes · ${totalLabels} labels · ${totalSheets} sheet${totalSheets!==1?'s':''}</span>
  </div>`;

  for (let sh = 0; sh < totalSheets; sh++) {
    const sheetCols = columns.slice(sh * COLS, (sh+1) * COLS);
    const cells     = _interleaveCols(sheetCols, COLS, ROWS);
    html += `<div style="margin-bottom:16px">
      <div style="font-size:10px;color:var(--text-muted);margin-bottom:4px">Sheet ${sh+1} &nbsp;·&nbsp; OL285 · 1.25" × 0.75" · 6 cols × 12 rows · margins: 0.5" L/R, 1" T/B</div>
      <div style="background:#e0e0e0;display:inline-block;border:1px solid #bbb;box-shadow:0 2px 8px rgba(0,0,0,.25);width:calc(8.5in * ${SC});height:calc(11in * ${SC});padding:calc(${MT}in * ${SC}) calc(${ML}in * ${SC});box-sizing:border-box;">
        <div style="display:grid;grid-template-columns:repeat(${COLS},calc(1.25in * ${SC}));grid-template-rows:repeat(${ROWS},calc(0.75in * ${SC}));gap:0;background:#fff;border:0.5px solid #bbb;">
          ${cells.map(lb => {
            if (lb.type === 'empty-slot') return `<div class="lbl-cell-cpc empty-slot"></div>`;
            if (lb.type === 'header') return `<div class="lbl-cell-cpc header" style="background:${lb.color}"><span class="lbl-univ">${h(lb.univ)}</span><span class="lbl-loc">${h(lb.loc)}</span></div>`;
            return `<div class="lbl-cell-cpc ${lb.type}"><span class="lbl-linenum">${h(lb.snakeName)} · L${lb.lineNum}</span><span class="lbl-univ">${h(lb.univ)}</span><span class="lbl-loc">${h(lb.loc)}</span></div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
  }
  return html;
}

// ── Rack Equipment Preview ────────────────────────────────
function _rackLabelData(racks) {
  const labels = [];
  racks.forEach(rack => {
    (rack.equipment||[]).forEach(eq => {
      const type  = getType(eq.typeId);
      const name  = eq.label || type?.name || '';
      const typeName = type?.name || '';
      labels.push({
        name,
        typeName,
        ip:    eq.ip    || '',
        notes: eq.notes || '',
        rack:  rack.name,
        color: rack.color
      });
    });
  });
  return labels;
}

function _rackLabelPreview(allRacks) {
  const selRacks = allRacks.filter(r => (S.lblSelRacks||{})[r.id] !== false);
  if (!selRacks.length) return `<div style="color:var(--text-muted);padding:40px;text-align:center">Select racks from the sidebar to preview labels.</div>`;

  const labels   = _rackLabelData(selRacks);
  const COLS     = 3;
  const ROWS     = 10;
  const perSheet = COLS * ROWS;
  const totalSheets = Math.ceil(labels.length / perSheet);

  while (labels.length % perSheet !== 0) labels.push(null);

  let html = `<div class="lbl-preview-header">
    <h3>Rack Equipment Labels</h3>
    <span class="lbl-info">${selRacks.length} rack${selRacks.length!==1?'s':''} · ${labels.filter(Boolean).length} items · ${totalSheets} sheet${totalSheets!==1?'s':''}</span>
  </div>`;

  const SC   = S.labelZoom || 0.5; // preview scale
  // OL875 margins: 0.1875" L/R, 0.5" T/B, 0.125" col gap
  const ML875 = 0.1875, MT875 = 0.5, CGAP875 = 0.125;

  for (let sh = 0; sh < totalSheets; sh++) {
    const chunk = labels.slice(sh * perSheet, (sh+1) * perSheet);
    html += `<div style="margin-bottom:16px">
      <div style="font-size:10px;color:var(--text-muted);margin-bottom:4px">Sheet ${sh+1} &nbsp;·&nbsp; OL875 · 2.625" × 1" · 3 cols × 10 rows · margins: 0.1875" L/R, 0.5" T/B</div>
      <div style="background:#e0e0e0;display:inline-block;border:1px solid #bbb;box-shadow:0 2px 8px rgba(0,0,0,.25);width:calc(8.5in * ${SC});height:calc(11in * ${SC});padding:calc(${MT875}in * ${SC}) calc(${ML875}in * ${SC});box-sizing:border-box;">
        <div style="display:grid;grid-template-columns:repeat(${COLS},calc(2.625in * ${SC}));grid-template-rows:repeat(${ROWS},calc(1in * ${SC}));column-gap:calc(${CGAP875}in * ${SC});row-gap:0;background:#fff;border:0.5px solid #bbb;">
          ${chunk.map(lb => lb ? `
            <div class="lbl-cell-rack">
              <span class="lbl-rack-name">${h(lb.name)}</span>
              ${lb.ip   ? `<span class="lbl-rack-ip">${h(lb.ip)}</span>` : ''}
              <span class="lbl-rack-meta">${h(lb.rack)}${lb.notes?' · '+lb.notes:''}</span>
            </div>` : `<div class="lbl-cell-rack empty-slot"></div>`).join('')}
        </div>
      </div>
    </div>`;
  }
  return html;
}

// OL285: 1.25" × 0.75", 6 cols × 12 rows, letter sheet
// Margins: 0.5" L/R, 1" T/B — each snake is its own column
function exportCPCLabelsPDF() {
  const snakes = _getSelSnakes();
  if (!snakes.length) { alert('No snakes selected.'); return; }
  const proj = S.project?.name || 'Project';
  const dt   = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

  const LW = 1.25, LH = 0.75;
  const COLS = 6, ROWS = 12;
  const ML = 0.5, MT = 1.0;

  const EMPTY_DIV = `<div style="background:#f8f8f8"></div>`;

  function cellHtml(lb) {
    if (lb.type === 'empty-slot') return EMPTY_DIV;
    if (lb.type === 'header') {
      const bg = lb.color || '#222222';
      const center = 'text-align:center;width:100%;';
      return `<div style="background:${bg};display:flex;flex-direction:column;justify-content:center;align-items:center;padding:1pt 2pt;overflow:hidden">
        <div style="font-size:12pt;font-weight:800;font-family:'Courier New',monospace;color:#fff;${center}">${h(lb.univ)}</div>
        <div style="font-size:7pt;font-weight:700;font-family:'Courier New',monospace;color:rgba(255,255,255,.7);letter-spacing:.1em;text-transform:uppercase;${center}">${h(lb.loc)}</div>
      </div>`;
    }
    const isSpare  = lb.type === 'spare';
    const isUnused = lb.type === 'unused';
    const bg       = '#ffffff';
    const univColor = isSpare ? '#cc00cc' : isUnused ? '#bbbbbb' : '#000000';
    const locColor  = isUnused ? '#bbbbbb' : '#000000';   // location never pink
    const center    = 'text-align:center;width:100%;';
    const numStyle  = `font-size:5.5pt;color:#aaa;font-family:'Courier New',monospace;line-height:1;${center}`;
    const univStyle = `font-size:10pt;font-weight:800;font-family:'Courier New',monospace;color:${univColor};line-height:1.15;white-space:nowrap;overflow:hidden;${center}`;
    const locStyle  = `font-size:7.5pt;font-weight:600;font-family:'Courier New',monospace;color:${locColor};line-height:1.2;white-space:nowrap;overflow:hidden;${center}`;
    return `<div style="background:${bg};display:flex;flex-direction:column;justify-content:center;align-items:center;padding:1pt 2pt;overflow:hidden">
      <div style="${numStyle}">${h(lb.snakeName)} L${lb.lineNum}</div>
      <div style="${univStyle}">${h(lb.univ)}</div>
      <div style="${locStyle}">${h(lb.loc)}</div>
    </div>`;
  }

  const columns     = _buildCpcColumns(snakes);
  const totalSheets = Math.ceil(columns.length / COLS);

  const sheets = [];
  for (let sh = 0; sh < totalSheets; sh++) {
    const sheetCols = columns.slice(sh * COLS, (sh+1) * COLS);
    const cells     = _interleaveCols(sheetCols, COLS, ROWS);
    sheets.push(cells.map(cellHtml));
  }

  const sheetHtml = sheets.map((cells, si) => `
    <div class="pg">
      <div class="grid">${cells.join('')}</div>
      <div class="footer">${h(proj)} · CPC Breakout Labels · Sheet ${si+1} of ${sheets.length} · ${dt}</div>
    </div>`).join('');

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>${h(proj)} — CPC Breakout Labels</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,sans-serif;background:#fff;}
    @page{size:letter;margin:0;}
    .pg{width:8.5in;height:11in;position:relative;page-break-after:always;padding:${MT}in ${ML}in;}
    .grid{display:grid;grid-template-columns:repeat(${COLS},${LW}in);grid-template-rows:repeat(${ROWS},${LH}in);gap:0;border:0.5pt solid #eee;}
    .grid > div{border:0.5pt solid #ddd;}
    .footer{position:absolute;bottom:0.25in;left:${ML}in;right:${ML}in;font-size:7pt;color:#aaa;text-align:center;}
  </style>
  </head><body>${sheetHtml}</body></html>`;

  _openPrint(html, 'CPC Breakout Labels');
}

// OL875: 2.625" × 1", 3 cols × 10 rows, letter sheet
// Margins: 0.1875" L/R, 0.5" T/B, 0.125" column gap
function exportRackLabelsPDF() {
  const racks = _getSelRacks();
  if (!racks.length) { alert('No racks selected.'); return; }
  const labels = _rackLabelData(racks);
  const proj   = S.project?.name || 'Project';
  const dt     = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

  const LW = 2.625, LH = 1.0;
  const COLS = 3, ROWS = 10;
  const ML = 0.1875, MT = 0.5;
  const CGAP = 0.125;

  const labelCells = labels.map(lb => {
    if (!lb) return `<div style="background:#f8f8f8"></div>`;
    const nameStr  = lb.name;
    const metaStr  = lb.rack + (lb.notes ? ' · ' + lb.notes : '');
    return `
      <div style="background:#fff;display:flex;flex-direction:column;justify-content:center;padding:2pt 6pt;overflow:hidden;gap:1pt">
        <div style="font-size:11pt;font-weight:800;font-family:'Courier New',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${h(nameStr)}</div>
        ${lb.ip ? `<div style="font-size:9pt;font-family:'Courier New',monospace;color:#0044cc;white-space:nowrap">${h(lb.ip)}</div>` : ''}
        <div style="font-size:7.5pt;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${h(metaStr)}</div>
      </div>`;
  });

  const perSheet = COLS * ROWS;
  while (labelCells.length % perSheet !== 0) labelCells.push(`<div style="background:#f8f8f8"></div>`);

  const sheets = [];
  for (let i = 0; i < labelCells.length; i += perSheet) {
    sheets.push(labelCells.slice(i, i + perSheet));
  }

  const sheetHtml = sheets.map((cells, si) => `
    <div class="pg">
      <div class="grid">${cells.join('')}</div>
      <div class="footer">${h(proj)} · Rack Equipment Labels · Sheet ${si+1} of ${sheets.length} · ${dt}</div>
    </div>`).join('');

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>${h(proj)} — Rack Equipment Labels</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,sans-serif;background:#fff;}
    @page{size:letter;margin:0;}
    .pg{
      width:8.5in;height:11in;position:relative;page-break-after:always;
      padding:${MT}in ${ML}in;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(${COLS},${LW}in);
      grid-template-rows:repeat(${ROWS},${LH}in);
      column-gap:${CGAP}in;
      row-gap:0;
      border:0.5pt solid #eee;
    }
    .grid > div{border:0.5pt solid #ddd;}
    .footer{
      position:absolute;bottom:0.25in;left:${ML}in;right:${ML}in;
      font-size:7pt;color:#aaa;text-align:center;
    }
  </style>
  </head><body>${sheetHtml}</body></html>`;

  _openPrint(html, 'Rack Equipment Labels');
}
