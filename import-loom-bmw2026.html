function doImport() {
  const status = document.getElementById('status');
  try {
    const json = decodeURIComponent(escape(atob(B64)));
    const showObj = JSON.parse(json);
    let shows = {};
    try { shows = JSON.parse(localStorage.getItem('loom_builder_shows')) || {}; } catch(e) {}
    shows[showObj.id] = showObj;
    localStorage.setItem('loom_builder_shows', JSON.stringify(shows));
    localStorage.setItem('loom_builder_active', showObj.id);
    status.className = 'ok';
    status.textContent = '✓ Imported 214 cables. Redirecting to Loom Builder…';
    setTimeout(() => window.location.href = 'loom-builder/index.html', 1200);
  } catch(e) {
    status.className = 'err';
    status.textContent = '✗ Error: ' + e.message;
  }
